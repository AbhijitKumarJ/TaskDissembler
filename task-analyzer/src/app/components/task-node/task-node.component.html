<div class="task-node mb-2" [class.expanded]="isExpanded" [class.depth-0]="depth === 0" [class.depth-1]="depth === 1" [class.depth-2]="depth === 2" [class.depth-3]="depth === 3" [class.depth-4]="depth >= 4">
  <div [id]="'node-' + node.id"
       class="node-content p-3 rounded" 
       [class.bg-dark]="!isRoot" 
       [class.bg-dark.bg-opacity-10]="isRoot"
       [class.border]="isRoot"
       [class.border-2]="isRoot"
       [class.border-primary]="isRoot"
       [class.border-opacity-25]="isRoot">
       
    <div class="d-flex align-items-start">
      <!-- Toggle button for nodes with children -->
      <button *ngIf="node.children && node.children.length > 0" 
              class="btn btn-sm btn-link toggle-btn me-2 mt-1" 
              (click)="toggleExpand()"
              [attr.aria-expanded]="isExpanded">
        <i class="fas" 
           [class.fa-chevron-right]="!isExpanded" 
           [class.fa-chevron-down]="isExpanded"
           [title]="isExpanded ? 'Collapse' : 'Expand'">
        </i>
      </button>
      
      <!-- Node content (view mode) -->
      <div class="flex-grow-1" (dblclick)="startEditing()" *ngIf="!isEditing">
        <div class="d-flex align-items-center">
          <h5 class="mb-0 me-2">{{ node.text }}</h5>
          <span *ngIf="node.children && node.children.length > 0" class="badge bg-primary bg-opacity-25 text-primary">
            {{ node.children.length }} {{ node.children.length === 1 ? 'subtask' : 'subtasks' }}
          </span>
        </div>
        <div *ngIf="node.description" class="node-description text-muted mt-1">
          {{ node.description }}
        </div>
        
        <!-- Metadata -->
        <div *ngIf="node.properties && node.properties['lastUpdated']" class="node-meta text-muted small mt-2">
          <i class="far fa-clock me-1"></i>
          Updated {{ formatDate(node.properties['lastUpdated']) }}
        </div>
        
        <!-- Node Properties -->
        <div *ngIf="node.properties && objectKeys(node.properties).length > 0" class="node-properties mt-2">
          <button class="btn btn-sm btn-link text-muted p-0" (click)="toggleProperties()">
            <i class="fas" [class.fa-chevron-right]="!showProperties" [class.fa-chevron-down]="showProperties"></i>
            {{ showProperties ? 'Hide' : 'Show' }} Properties
          </button>
          <div *ngIf="showProperties" class="mt-2 p-2 rounded bg-dark bg-opacity-10">
            <div *ngFor="let key of objectKeys(node.properties)" class="mb-1">
              <ng-container *ngIf="key !== 'lastUpdated' && key !== 'created'">
                <strong class="text-muted">{{ key }}:</strong> 
                <span *ngIf="isSimpleValue(node.properties[key])">{{ node.properties[key] }}</span>
                <span *ngIf="!isSimpleValue(node.properties[key])" class="text-break">{{ formatComplexValue(node.properties[key]) }}</span>
              </ng-container>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Edit form -->
      <div class="flex-grow-1" *ngIf="isEditing">
        <div class="mb-2">
          <label class="form-label small text-muted mb-1">Task Name</label>
          <input type="text" 
                 class="form-control form-control-sm mb-2" 
                 [(ngModel)]="editingText"
                 placeholder="Enter task name"
                 (keyup.enter)="saveEdit()"
                 autofocus>
          
          <label class="form-label small text-muted mb-1">Description</label>
          <textarea class="form-control form-control-sm mb-2" 
                    rows="2" 
                    [(ngModel)]="editingDescription"
                    placeholder="Enter description (optional)" ></textarea>
          
          
          <label class="form-label small text-muted mb-1">Properties (JSON)</label>
          <textarea class="form-control form-control-sm mb-2" 
                    rows="4" 
                    [(ngModel)]="editingPropertiesJson"
                    placeholder='{\\n  \"key\": \"value\" \\n}' ></textarea>
          
          <div *ngIf="propertiesError" class="text-danger small mb-2">
            {{ propertiesError }}
          </div>
          
          <div class="d-flex justify-content-end gap-2">
            <button class="btn btn-sm btn-outline-secondary" 
                    (click)="cancelEdit()"
                    [disabled]="isSaving">
              Cancel
            </button>
            <button class="btn btn-sm btn-primary" 
                    (click)="saveEdit()"
                    [disabled]="!editingText.trim() || isSaving || propertiesError">
              <span *ngIf="!isSaving">Save</span>
              <span *ngIf="isSaving" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </div>
      
      <!-- Action buttons -->
      <div class="node-actions ms-2" *ngIf="!isEditing">
        <div class="btn-group btn-group-sm" role="group">
          <button class="btn btn-outline-primary" 
                  (click)="startEditing()" 
                  title="Edit task">
            <i class="fas fa-edit"></i>
          </button>
          <button class="btn btn-outline-success" 
                  (click)="addChild()" 
                  title="Add subtask">
            <i class="fas fa-plus"></i>
          </button>
          <button *ngIf="!isRoot" 
                  class="btn btn-outline-secondary" 
                  title="Add sibling above"
                  (click)="addSibling('above', $event)">
            <i class="fas fa-arrow-up"></i>
          </button>
          <button *ngIf="!isRoot" 
                  class="btn btn-outline-secondary" 
                  title="Add sibling below"
                  (click)="addSibling('below', $event)">
            <i class="fas fa-arrow-down"></i>
          </button>
          <div class="btn-group" *ngIf="!isRoot">
            <button class="btn btn-outline-secondary btn-sm" 
                    (click)="moveNode('up')"
                    [disabled]="isFirstSibling"
                    title="Move up">
              <i class="fas fa-arrow-up"></i>
            </button>
            <button class="btn btn-outline-secondary btn-sm" 
                    (click)="moveNode('down')"
                    [disabled]="isLastSibling"
                    title="Move down">
              <i class="fas fa-arrow-down"></i>
            </button>
            <button class="btn btn-outline-secondary btn-sm" 
                    (click)="moveNode('outdent')"
                    [disabled]="isRoot || depth <= 1"
                    title="Outdent (move to parent level)">
              <i class="fas fa-outdent"></i>
            </button>
          </div>
          <button class="btn btn-outline-info" 
                  (click)="subdivide()" 
                  title="Subdivide task (AI-powered)"
                  [disabled]="isSubdividing">
            <span *ngIf="!isSubdividing"><i class="fas fa-sitemap"></i></span>
            <span *ngIf="isSubdividing" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          </button>
          <button class="btn btn-outline-danger" 
                  (click)="deleteNode()" 
                  title="Delete task">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Child nodes -->
  <div class="node-children ms-4 mt-2" 
       *ngIf="isExpanded && node.children && node.children.length > 0"
       style="border-left: 2px solid rgba(13, 110, 253, 0.2); padding-left: 1.5rem;">
    <div class="children" *ngIf="node.children && node.children.length > 0">
      <app-task-node 
        *ngFor="let child of node.children; let i = index; trackBy: trackByNodeId" 
        [node]="child" 
        [isRoot]="false"
        [depth]="depth + 1"
        [parentNode]="node"
        [indexInParent]="i"
        [isFirstSibling]="i === 0"
        [isLastSibling]="i === node.children!.length - 1"
        (nodeUpdated)="onChildUpdated($event)"
        (nodeDeleted)="onChildDeleted($event)"
        (nodeSubdivided)="onChildSubdivided($event)"
        (addSiblingRequested)="addSiblingRequested.emit($event)"
        (nodeMoved)="onNodeMoved($event)">
      </app-task-node>
    </div>
  </div>
</div>
