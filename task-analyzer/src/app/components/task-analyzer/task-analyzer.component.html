<div class="container py-4">
  <div class="row mb-4">
    <div class="col-12">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="h3 mb-0">
            <i class="fas fa-project-diagram text-primary me-2"></i>
            Task Analysis
          </h1>
          <p class="text-muted mb-0" *ngIf="rootNode">
            Manage and organize your task breakdown
          </p>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary" 
                  (click)="exportTask()"
                  [disabled]="!rootNode">
            <i class="fas fa-download me-1"></i> Export
          </button>
          <button class="btn btn-primary" (click)="addRootNode()">
            <i class="fas fa-plus me-1"></i> Add Root Task
          </button>
        </div>
      </div>
      
      <div class="alert alert-info" *ngIf="!rootNode">
        <div class="d-flex align-items-center">
          <i class="fas fa-info-circle me-2"></i>
          <div>
            <strong>No task loaded.</strong> Create a new root task or import an existing one to get started.
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="task-tree" *ngIf="rootNode">
    <app-task-node 
      *ngIf="rootNode"
      [node]="rootNode" 
      [isRoot]="true"
      [depth]="0"
      [isFirstSibling]="true"
      [isLastSibling]="true"
      (nodeUpdated)="onNodeUpdated($event)"
      (nodeDeleted)="onNodeDeleted($event)"
      (nodeSubdivided)="onNodeSubdivided($event)"
      (addSiblingRequested)="onAddSiblingRequested($event)"
      (nodeMoved)="onNodeMoved($event)">
    </app-task-node>
  </div>
</div>
